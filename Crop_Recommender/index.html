<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Crop Recommendation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.55.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "scikit-learn", "numpy"], // Your python libraries
        entrypoint: "app.py",
        files: {
          "app.py": {
            url: "https://raw.githubusercontent.com/christopherjose1/crop-recommendation-system/main/Crop_Recommender/app.py"
          },
          "crop_model.pkl": {
            url: "https://raw.githubusercontent.com/christopherjose1/crop-recommendation-system/main/Crop_Recommender/crop_model.pkl"
          }
        }
      }, document.getElementById("root"));
    </script>
  </body>
</html>
